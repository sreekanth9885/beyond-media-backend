version: "3.9"

services:

  mysql:
    image: mysql:8.4

    container_name: beyond-media-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: beyond_media

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:

    build: .

    container_name: beyond-media-api

    restart: always

    ports:
      - "3000:3000"

    depends_on:
      - mysql

    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: beyond_media
      JWT_SECRET: BeyondMedia@2026
      JWT_EXPIRES_IN: 7d

volumes:
  mysql_data: